<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pedidos do Dia — Expedição Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/erp.css" />
  <style>
    /* ── LAYOUT PEDIDOS ── */
    .orders-layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── COLUNA LISTA ── */
    .orders-list-col {
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .orders-list-toolbar {
      padding: 10px 12px; border-bottom: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    .orders-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
    .otab {
      padding: 6px 4px; background: var(--depth-4);
      border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
      cursor: pointer; font-family: var(--font-body); font-size: 11px;
      font-weight: 600; color: var(--text-secondary); text-align: center;
      transition: all var(--transition-fast);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .otab:hover { background: var(--depth-5); color: var(--text-primary); }
    .otab.active { background: rgba(59,130,246,.12); color: var(--accent-blue); border-color: rgba(59,130,246,.25); }
    .otab-count { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; line-height: 1; }
    .otab.active .otab-count { color: var(--accent-blue); }
    .orders-search input {
      width: 100%; background: var(--depth-4); border: 1px solid var(--border-subtle);
      border-radius: var(--r-sm); padding: 7px 10px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 12px; outline: none;
    }
    .orders-search input:focus { border-color: var(--accent-blue); }
    .orders-list-scroll { flex: 1; overflow-y: auto; padding: 8px; }
    .orders-list-scroll::-webkit-scrollbar { width: 3px; }
    .orders-list-scroll::-webkit-scrollbar-thumb { background: var(--depth-5); border-radius: 2px; }

    /* ── ORDER CARD (gerado pelo pedidos.js) ── */
    .order-card {
      background: var(--depth-3); border: 1px solid var(--border-default);
      border-left: 3px solid transparent; border-radius: var(--r-md);
      padding: 10px 12px; cursor: pointer; transition: all var(--transition-fast);
      margin-bottom: 6px; display: block; width: 100%; text-align: left;
      color: inherit; font-family: var(--font-body);
    }
    .order-card:hover { background: var(--depth-4); border-color: var(--border-strong); }
    .order-card.active { border-color: var(--accent-blue); border-left-color: var(--accent-blue); background: rgba(59,130,246,.07); }
    .order-card.priority { border-left-color: var(--accent-yellow); }

    /* Classes internas do order card */
    .oc-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 5px; }
    .oc-id { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; }
    .oc-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .oc-badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: var(--r-full); }
    .badge-ml    { background: rgba(245,200,66,.9); color: #000; }
    .badge-shop  { background: rgba(249,115,22,.15); color: var(--accent-orange); border: 1px solid rgba(249,115,22,.25); }
    .badge-flex  { background: var(--accent-yellow); color: #000; }
    .badge-other { background: var(--depth-5); color: var(--text-secondary); border: 1px solid var(--border-default); }

    .oc-ratio { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-secondary); }
    .oc-time  { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    .oc-thumbs { display: flex; gap: 3px; margin-top: 6px; }
    .oc-thumb { width: 26px; height: 26px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border-subtle); background: var(--depth-4); }
    .oc-thumb-more { width: 26px; height: 26px; border-radius: 4px; background: var(--depth-5); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--text-muted); border: 1px solid var(--border-default); }

    .oc-progress { margin-top: 7px; }
    .oc-bar-wrap { height: 3px; background: var(--depth-5); border-radius: var(--r-full); overflow: hidden; }
    .oc-bar { height: 100%; border-radius: var(--r-full); background: var(--accent-blue); transition: width .3s; }
    .oc-bar.full { background: var(--accent-green); }

    /* Tags status */
    .tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: var(--r-full); }
    .tag-pending { background: rgba(249,115,22,.15); color: var(--accent-orange); border: 1px solid rgba(249,115,22,.25); }
    .tag-picked  { background: rgba(59,130,246,.15);  color: var(--accent-blue);   border: 1px solid rgba(59,130,246,.25); }
    .tag-packed  { background: rgba(16,185,129,.15);  color: var(--accent-green);  border: 1px solid rgba(16,185,129,.25); }

    /* ── COLUNA DETALHE ── */
    .orders-detail-col { display: flex; flex-direction: column; overflow: hidden; }
    .detail-header {
      padding: 12px 18px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-shrink: 0; background: var(--depth-3);
    }
    .detail-order-id { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
    .detail-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 3px; }
    .scanner-bar-wrap { padding: 8px 18px; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; }
    .items-scroll {
      flex: 1; overflow-y: auto; padding: 12px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .items-scroll::-webkit-scrollbar { width: 4px; }
    .items-scroll::-webkit-scrollbar-thumb { background: var(--depth-4); border-radius: 2px; }
    .progress-footer-wrap {
      padding: 10px 18px; border-top: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      background: var(--depth-3);
    }
    .no-order {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-muted); text-align: center; padding: 40px;
    }

    /* ── ITEM ROW (classes do pedidos.js) ── */
    .item-row {
      background: var(--depth-3); border: 1px solid var(--border-default);
      border-radius: var(--r-md); overflow: hidden; transition: border-color var(--transition-fast);
      position: relative;
    }
    .item-row.checked { border-color: rgba(16,185,129,.25); background: rgba(16,185,129,.03); }
    .item-row.checked::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--accent-green);
    }

    .item-top {
      display: grid; grid-template-columns: 80px 1fr 88px;
      min-height: 80px;
    }

    .item-img-wrap {
      position: relative; cursor: pointer;
    }
    .item-photo-img {
      width: 80px; height: 80px; object-fit: cover; display: block; background: var(--depth-4);
    }
    .photo-hint {
      position: absolute; bottom: 4px; right: 4px;
      font-size: 11px; background: rgba(0,0,0,.55); border-radius: 4px;
      padding: 1px 4px;
    }

    .item-info {
      padding: 9px 12px; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0;
    }
    .item-name { font-weight: 700; font-size: 13px; line-height: 1.3; }
    .item-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .itag {
      font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted);
      background: var(--depth-5); border: 1px solid var(--border-subtle);
      padding: 2px 5px; border-radius: 4px;
    }
    .itag-bin { color: var(--accent-yellow); border-color: rgba(245,200,66,.2); background: rgba(245,200,66,.06); }
    .item-notes {
      font-size: 11px; color: var(--accent-orange); background: rgba(249,115,22,.08);
      border: 1px solid rgba(249,115,22,.2); border-radius: var(--r-sm); padding: 3px 7px;
    }
    .btn-expand {
      background: none; border: none; color: var(--accent-blue); font-size: 11px;
      font-weight: 700; cursor: pointer; padding: 0; text-align: left; font-family: var(--font-body);
    }
    .btn-expand:hover { text-decoration: underline; }

    .item-qty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 14px; gap: 5px; border-left: 1px solid var(--border-subtle);
      background: var(--depth-4);
    }
    .qty-num {
      font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1;
      color: var(--text-primary);
    }
    .qty-num.full { color: var(--accent-green); }
    .qty-of { font-size: 9px; color: var(--text-muted); }
    .qty-btn {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      background: var(--depth-5); border: 1px solid var(--border-default);
      color: var(--text-primary); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition-fast);
    }
    .qty-btn:hover:not(:disabled) { background: var(--accent-blue); border-color: transparent; color: #fff; }
    .qty-btn:disabled { opacity: .25; cursor: not-allowed; }
    .qty-btn.done { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.3); color: var(--accent-green); }

    /* ── PAINEL FOTOS ── */
    .item-photos-panel {
      border-top: 1px solid var(--border-subtle); background: var(--depth-4); padding: 12px 14px;
    }
    .item-photos-panel.hidden { display: none; }
    .photos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .photo-col { display: flex; flex-direction: column; gap: 5px; }
    .photo-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .4px;
      display: flex; justify-content: space-between;
    }
    .photo-date { font-size: 9px; font-weight: 400; color: var(--text-muted); }
    .photo-big {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: var(--r-md); border: 1px solid var(--border-default);
      background: var(--depth-5); cursor: zoom-in;
    }
    .photo-empty {
      width: 100%; aspect-ratio: 1; border-radius: var(--r-md);
      border: 1px dashed var(--border-default); background: var(--depth-5);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-muted); text-align: center; gap: 3px;
    }
    .photo-empty span { font-size: 10px; color: var(--text-muted); }
    .bin-label-big {
      margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--accent-yellow);
      background: rgba(245,200,66,.07); border-radius: var(--r-sm);
      padding: 6px 10px; border: 1px solid rgba(245,200,66,.15);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .orders-layout { grid-template-columns: 1fr; }
      .orders-list-col { height: 280px; border-right: none; border-bottom: 1px solid var(--border-subtle); }
    }
  </style>
</head>
<body>

<div class="erp-layout">
  <div id="sidebar-placeholder"></div>

  <main class="erp-main" style="overflow:hidden;display:flex;flex-direction:column;">

    <div class="page-header" style="padding-bottom:12px;flex-shrink:0;">
      <div>
        <h1 class="page-title">📦 Pedidos do Dia</h1>
        <p class="page-subtitle">Separação com scanner · bipe SKU ou EAN + Enter</p>
      </div>
      <div class="page-actions">
        <div class="badge badge-muted font-mono" id="clock" style="padding:5px 10px;">--:--:--</div>
        <button class="btn btn-ghost btn-sm" onclick="refreshAll()">⟳</button>
        <a href="/manual" class="btn btn-primary btn-sm">+ Pedido</a>
      </div>
    </div>

    <div class="orders-layout">

      <!-- LISTA -->
      <div class="orders-list-col">
        <div class="orders-list-toolbar">
          <div class="orders-tabs">
            <button class="otab active" data-status="pending" onclick="switchTab('pending')">
              <span class="otab-count" id="tc-p">0</span><span>Separar</span>
            </button>
            <button class="otab" data-status="picked" onclick="switchTab('picked')">
              <span class="otab-count" id="tc-i">0</span><span>Separado</span>
            </button>
            <button class="otab" data-status="packed" onclick="switchTab('packed')">
              <span class="otab-count" id="tc-k">0</span><span>Expedido</span>
            </button>
          </div>
          <div class="orders-search">
            <input type="text" id="filterInput" placeholder="Filtrar pedidos…" oninput="renderList()" />
          </div>
        </div>
        <div class="orders-list-scroll" id="orderList"></div>
      </div>

      <!-- DETALHE -->
      <div class="orders-detail-col">

        <div class="no-order" id="noOrder">
          <div style="font-size:44px;opacity:.1;">📦</div>
          <div style="font-size:15px;color:var(--text-secondary);font-weight:600;">Selecione um pedido</div>
          <div style="font-size:12px;max-width:240px;line-height:1.6;">Clique em um pedido para ver os itens e iniciar a separação.</div>
        </div>

        <div id="orderView" style="display:none;flex-direction:column;height:100%;overflow:hidden;">

          <div class="detail-header">
            <div>
              <div class="detail-order-id" id="viewId">—</div>
              <div class="detail-meta" id="viewMeta"></div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button class="btn btn-ghost btn-sm" onclick="refreshSelected()">⟳</button>
              <button class="btn btn-primary btn-sm" id="btnPicked" disabled onclick="markPicked()">✓ Confirmar</button>
              <button class="btn btn-success btn-sm" id="btnPacked" disabled onclick="markPacked()">🚚 Expedir</button>
            </div>
          </div>

          <div class="scanner-bar-wrap">
            <div class="scanner-bar">
              <div class="scanner-pulse"></div>
              <span><strong>Scanner ativo</strong> — bipe SKU ou EAN + Enter</span>
              <span class="scanner-status ready font-mono" id="scanStatus">● PRONTO</span>
            </div>
          </div>

          <div class="items-scroll" id="itemsArea"></div>

          <div class="progress-footer-wrap">
            <span style="font-size:11px;color:var(--text-secondary);">Progresso</span>
            <div class="progress-bar-wrap" style="flex:1;">
              <div class="progress-bar-fill" id="pfBar" style="width:0%"></div>
            </div>
            <span class="font-mono" style="font-size:13px;font-weight:700;" id="pfPct">0 / 0</span>
          </div>

        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div class="scan-flash" id="scanFlash"></div>
<input type="text" id="scannerInput" style="opacity:0;position:absolute;pointer-events:none;width:1px;height:1px;" autocomplete="off" />

<script src="/menu.js"></script>
<script>
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR');}
setInterval(tick,1000);tick();
</script>
<script src="/pedidos.js"></script>
</body>
</html>
