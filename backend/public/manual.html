<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Criar Pedido — Expedição Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/erp.css" />
  <style>
    .mkt-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .mkt-btn {
      padding: 8px 16px; border-radius: var(--r-md);
      border: 1px solid var(--border-default); background: var(--depth-4);
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-body);
      font-size: 13px; font-weight: 600; transition: all var(--transition-fast);
    }
    .mkt-btn.active-ml   { background: rgba(245,200,66,.15); color: var(--accent-yellow); border-color: rgba(245,200,66,.3); }
    .mkt-btn.active-shop { background: rgba(249,115,22,.15); color: var(--accent-orange); border-color: rgba(249,115,22,.3); }
    .mkt-btn.active-oth  { background: var(--depth-5); color: var(--text-primary); border-color: var(--border-strong); }

    .priority-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--depth-4); border-radius: var(--r-md);
      border: 1px solid var(--border-subtle); margin-top: 14px;
    }
    .toggle {
      position: relative; width: 40px; height: 22px;
      background: var(--depth-5); border: 1px solid var(--border-default);
      border-radius: 999px; cursor: pointer; transition: .2s; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent-yellow); border-color: transparent; }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; background: #fff;
      border-radius: 50%; transition: .2s;
    }
    .toggle.on .toggle-knob { left: 21px; background: #000; }
    .priority-title { font-size: 13px; font-weight: 700; }
    .priority-hint  { font-size: 11px; color: var(--text-secondary); }

    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; }
    .search-info { font-size: 12px; color: var(--text-secondary); margin-top: 6px; min-height: 18px; }
    .item-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

    .item-card {
      background: var(--depth-4); border: 1px solid var(--border-default);
      border-radius: var(--r-md); display: grid;
      grid-template-columns: 56px 1fr auto; overflow: hidden;
    }
    .item-card-img { width: 56px; height: 56px; object-fit: cover; background: var(--depth-5); display: block; }
    .item-card-info { padding: 9px 12px; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
    .item-card-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .item-card-actions { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-left: 1px solid var(--border-subtle); background: var(--depth-5); }
    .qty-input {
      width: 60px; background: var(--depth-4); border: 1px solid var(--border-default);
      border-radius: var(--r-sm); padding: 6px 8px; color: var(--text-primary);
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      text-align: center; outline: none;
    }
    .qty-input:focus { border-color: var(--accent-blue); }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .chip {
      background: var(--depth-4); border: 1px solid var(--border-default);
      border-radius: var(--r-sm); padding: 5px 10px; cursor: pointer;
      transition: .15s; display: flex; gap: 6px; align-items: center;
    }
    .chip:hover { background: var(--depth-5); }
    .chip-name { font-size: 12px; font-weight: 700; }
    .chip-sku  { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }

    .cart-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
    .cart-info   { font-size: 12px; color: var(--text-secondary); min-height: 18px; flex: 1; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .empty-msg { font-size: 13px; color: var(--text-muted); padding: 6px 0; }
    .itag { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); background: var(--depth-5); border: 1px solid var(--border-subtle); padding: 2px 6px; border-radius: 5px; }
    .itag-bin { color: var(--accent-yellow); border-color: rgba(245,200,66,.2); background: rgba(245,200,66,.06); }
    .link { color: var(--accent-blue); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>

<div class="erp-layout">
  <div id="sidebar-placeholder"></div>

  <main class="erp-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">✏️ Criar Pedido</h1>
        <p class="page-subtitle">Monte pedidos manualmente por SKU ou EAN</p>
      </div>
      <div class="page-actions">
        <a href="/pedidos" class="btn btn-ghost btn-sm">← Pedidos do Dia</a>
      </div>
    </div>

    <div class="page-content" style="max-width:860px;">

      <!-- CONFIGURAÇÃO -->
      <div class="card">
        <div class="card-header"><div class="card-title">Configuração do Pedido</div></div>
        <div class="grid-2">
          <div class="field">
            <label>Marketplace</label>
            <div class="mkt-group">
              <button type="button" class="mkt-btn active-ml" data-val="MERCADO_LIVRE">Mercado Livre</button>
              <button type="button" class="mkt-btn" data-val="SHOPEE">Shopee</button>
              <button type="button" class="mkt-btn" data-val="OUTROS">Outros</button>
            </div>
            <input type="hidden" id="marketplace" value="MERCADO_LIVRE" />
          </div>
          <div class="field">
            <label>Cliente (opcional)</label>
            <input type="text" id="clienteNome" placeholder="Ex: João da Silva" />
          </div>
        </div>
        <div class="priority-row">
          <div class="toggle" id="prioToggle"><div class="toggle-knob"></div></div>
          <div style="flex:1;">
            <div class="priority-title">Pedido FLEX / Prioritário</div>
            <div class="priority-hint">Sobe ao topo e fica destacado em amarelo</div>
          </div>
          <span class="badge badge-flex" id="prioBadge" style="display:none">🔥 FLEX</span>
          <input type="checkbox" id="isPriority" style="display:none" />
        </div>
      </div>

      <!-- BUSCA -->
      <div class="card">
        <div class="card-header"><div class="card-title">Buscar Produto</div></div>
        <div class="search-row">
          <input type="text" id="searchQ" placeholder="Nome, SKU ou EAN…" />
          <button class="btn btn-primary" id="btnSearch">Buscar</button>
        </div>
        <div class="search-info" id="searchInfo">Digite ao menos 3 letras ou um SKU/EAN</div>
        <div class="item-list" id="searchResults"></div>
        <div style="margin-top:14px;">
          <div class="section-label">Últimos pesquisados</div>
          <div class="chips" id="recentChips"></div>
        </div>
      </div>

      <!-- CARRINHO -->
      <div class="card">
        <div class="card-header"><div class="card-title">Carrinho</div></div>
        <div class="empty-msg" id="cartEmpty">Nenhum item adicionado.</div>
        <div class="item-list" id="cartList"></div>
        <div class="cart-footer">
          <button class="btn btn-danger btn-sm" id="btnClear">Limpar</button>
          <div class="cart-info" id="createInfo"></div>
          <button class="btn btn-primary" id="btnCreate">Criar Pedido</button>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="/menu.js"></script>
<script>
'use strict';

const TERMINAL_KEY = 'expedicao_pro_terminal_id';
const RECENT_KEY   = 'expedicao_recent_v2';
const MIN_CHARS    = 3;
const DEBOUNCE_MS  = 220;

function tid() {
  let id = localStorage.getItem(TERMINAL_KEY);
  if (!id) { id = crypto.randomUUID(); localStorage.setItem(TERMINAL_KEY, id); }
  return id;
}

async function api(path, opts={}) {
  const token = localStorage.getItem('expedicao_token') || '';
  const res = await fetch(path, {
    ...opts,
    headers: { 'content-type':'application/json', 'x-terminal-id':tid(), 'authorization':`Bearer ${token}`, ...(opts.headers||{}) }
  });
  const d = await res.json().catch(()=>({}));
  if (res.status === 401) { window.location.href = '/login'; return; }
  if (!res.ok) throw new Error(d.error||`HTTP ${res.status}`);
  return d;
}

// Função para normalizar URLs de imagem no Manual
function fixImg(url) {
  if (!url) return '/assets/placeholder.png';
  // Se for Cloudinary (começa com http), retorna direto. Senão, usa /uploads/
  return url.startsWith('http') ? url : `/uploads/${url}`;
}

function esc(s) {
  return (s??'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
}

let _tt=null;
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── STATE ──
const state = { results:[], cart:new Map(), searching:false, lastQ:'', debTimer:null, activeId:0 };

// ── MARKETPLACE ──
const mktBtns = document.querySelectorAll('.mkt-btn');
const mktHidden = document.getElementById('marketplace');
mktBtns.forEach(b => b.addEventListener('click', () => {
  mktHidden.value = b.dataset.val;
  mktBtns.forEach(x => x.className = 'mkt-btn');
  if (b.dataset.val === 'MERCADO_LIVRE') b.classList.add('active-ml');
  else if (b.dataset.val === 'SHOPEE')   b.classList.add('active-shop');
  else                                   b.classList.add('active-oth');
}));

// ── PRIORITY ──
const prioToggle = document.getElementById('prioToggle');
const prioCheck  = document.getElementById('isPriority');
const prioBadge  = document.getElementById('prioBadge');
prioToggle.addEventListener('click', () => {
  prioCheck.checked = !prioCheck.checked;
  prioToggle.classList.toggle('on', prioCheck.checked);
  prioBadge.style.display = prioCheck.checked ? 'inline-flex' : 'none';
});

// ── SEARCH ──
async function doSearch() {
  const q = document.getElementById('searchQ').value.trim();
  const looksCode = q.length > 0 && !q.includes(' ');
  if (q.length < MIN_CHARS && !looksCode) { state.results = []; renderResults(); return; }
  if (q === state.lastQ) return;
  state.lastQ = q; state.searching = true;
  document.getElementById('searchInfo').textContent = 'Buscando…';
  const sid = ++state.activeId;
  try {
    const d = await api(`/products/search?q=${encodeURIComponent(q)}`);
    if (sid !== state.activeId) return;
    state.results = d?.items || [];
  } catch(e) {
    if (sid !== state.activeId) return;
    state.results = []; toast(`Erro: ${e.message}`, 'error');
  } finally {
    if (sid !== state.activeId) return;
    state.searching = false; renderResults();
  }
}

function schedSearch() {
  clearTimeout(state.debTimer);
  state.debTimer = setTimeout(doSearch, DEBOUNCE_MS);
}

function renderResults() {
  const box  = document.getElementById('searchResults');
  const info = document.getElementById('searchInfo');
  box.innerHTML = '';
  if (state.searching) { info.textContent = 'Buscando…'; return; }
  if (!state.results.length) { info.textContent = state.lastQ ? 'Sem resultados.' : 'Digite ao menos 3 letras ou um SKU/EAN'; return; }
  info.textContent = `${state.results.length} resultado(s)`;
  for (const p of state.results) {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `
      <img class="item-card-img" src="${fixImg(p.image)}" onerror="this.src='/assets/placeholder.png'" alt="">
      <div class="item-card-info">
        <div class="item-card-name">${esc(p.name||'')}</div>
        <div class="item-card-tags">
          <span class="itag">SKU ${esc(p.sku||'')}</span>
          <span class="itag">EAN ${esc(p.ean||'—')}</span>
          ${p.bin?`<span class="itag itag-bin">📍 ${esc(p.bin)}</span>`:''}
        </div>
      </div>
      <div class="item-card-actions">
        <input class="qty-input" type="number" min="1" value="1" />
        <button class="btn btn-primary btn-sm">+ Add</button>
      </div>
    `;
    const qtyEl = card.querySelector('.qty-input');
    card.querySelector('button').addEventListener('click', () => {
      addToCart(p, Number(qtyEl.value||1)); pushRecent(p); focusSearch(true);
    });
    box.appendChild(card);
  }
}

// ── CART ──
function addToCart(p, qty) {
  const prev = state.cart.get(p.sku);
  state.cart.set(p.sku, { ...p, qty: (prev?prev.qty:0) + (Number.isFinite(qty)?qty:1) });
  toast(`Adicionado: ${p.sku} ×${qty}`, 'ok'); renderCart();
}

function renderCart() {
  const empty = document.getElementById('cartEmpty');
  const list  = document.getElementById('cartList');
  list.innerHTML = '';
  const arr = Array.from(state.cart.values());
  empty.style.display = arr.length ? 'none' : 'block';
  for (const it of arr) {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `
      <img class="item-card-img" src="${fixImg(it.image)}" onerror="this.src='/assets/placeholder.png'" alt="">
      <div class="item-card-info">
        <div class="item-card-name">${esc(it.name||'')}</div>
        <div class="item-card-tags">
          <span class="itag">SKU ${esc(it.sku||'')}</span>
          <span class="itag">EAN ${esc(it.ean||'—')}</span>
          ${it.bin?`<span class="itag itag-bin">📍 ${esc(it.bin)}</span>`:''}
        </div>
      </div>
      <div class="item-card-actions">
        <input class="qty-input" type="number" min="1" value="${it.qty}" />
        <button class="btn btn-danger btn-sm">✕</button>
      </div>
    `;
    const qtyEl = card.querySelector('.qty-input');
    qtyEl.addEventListener('change', () => state.cart.set(it.sku, {...it, qty:Number(qtyEl.value||1)}));
    card.querySelector('button').addEventListener('click', () => { state.cart.delete(it.sku); renderCart(); });
    list.appendChild(card);
  }
}

// ── CREATE ──
async function doCreate() {
  const marketplace = mktHidden.value;
  const clienteNome = document.getElementById('clienteNome').value.trim();
  const isPriority  = document.getElementById('isPriority').checked;
  const cart = Array.from(state.cart.values()).map(it=>({sku:it.sku,qty:it.qty}));
  if (!cart.length) { toast('Carrinho vazio.', 'error'); return; }
  const info = document.getElementById('createInfo');
  info.textContent = 'Criando…';
  try {
    const d = await api('/orders/manual', { method:'POST', body:JSON.stringify({marketplace,clienteNome,isPriority,cart}) });
    toast(`Pedido criado: ${d.orderId}`, 'ok');
    info.innerHTML = `✅ <strong>${esc(d.orderId)}</strong> — <a class="link" href="/pedidos">abrir pedidos</a>`;
    state.cart.clear(); renderCart();
  } catch(e) {
    toast(`Erro: ${e.message}`, 'error');
    info.textContent = `Erro: ${e.message}`;
  }
}

// ── RECENTES ──
function loadRecent() { try { return JSON.parse(localStorage.getItem(RECENT_KEY)||'[]'); } catch { return []; } }
function saveRecent(l) { localStorage.setItem(RECENT_KEY, JSON.stringify(l.slice(0,10))); }
function pushRecent(p) {
  if (!p?.sku) return;
  const l = loadRecent().filter(x=>x.sku!==p.sku);
  l.unshift({sku:p.sku,name:p.name||''});
  saveRecent(l); renderRecent();
}
function renderRecent() {
  const el = document.getElementById('recentChips');
  const list = loadRecent();
  el.innerHTML = '';
  if (!list.length) { el.innerHTML='<div style="font-size:12px;color:var(--text-muted)">Nenhuma busca recente</div>'; return; }
  for (const p of list) {
    const btn = document.createElement('button');
    btn.type='button'; btn.className='chip';
    btn.innerHTML=`<span class="chip-name">${esc(p.name||'Produto')}</span><span class="chip-sku">${esc(p.sku)}</span>`;
    btn.addEventListener('click', async () => {
      document.getElementById('searchQ').value = p.sku;
      clearTimeout(state.debTimer); await doSearch();
      const found = state.results.find(r=>r.sku===p.sku)||state.results[0];
      if (found) { addToCart(found,1); pushRecent(found); focusSearch(true); }
    });
    el.appendChild(btn);
  }
}
function focusSearch(sel=false) {
  const el = document.getElementById('searchQ'); el.focus(); if (sel) el.select();
}

// ── BIND ──
document.getElementById('searchQ').addEventListener('input', schedSearch);
document.getElementById('searchQ').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return; e.preventDefault();
  if (state.results.length && !state.searching) {
    addToCart(state.results[0],1); pushRecent(state.results[0]); focusSearch(true); return;
  }
  clearTimeout(state.debTimer); await doSearch();
});
document.getElementById('btnSearch').addEventListener('click', () => { clearTimeout(state.debTimer); doSearch(); });
document.getElementById('btnClear').addEventListener('click', () => { state.cart.clear(); renderCart(); toast('Carrinho limpo','info'); });
document.getElementById('btnCreate').addEventListener('click', doCreate);

// ── INIT ──
renderCart(); renderResults(); renderRecent(); focusSearch();
</script>
</body>
</html>
