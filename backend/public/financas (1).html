<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Finanças — Universo ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/erp.css" />
  <style>
    /* Layout específico de finanças: form lateral + tabela */
    .fin-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .fin-layout { grid-template-columns: 1fr; }
    }

    /* Status badges */
    .s-pago     { color: var(--accent-green); font-weight: 700; font-size: 11px; }
    .s-pendente { color: var(--accent-orange); font-weight: 700; font-size: 11px; }

    /* Tabs container vem do financas.js */
    .tabs-container {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-default);
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      margin-bottom: 0;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    /* tab-btn gerado pelo financas.js */
    .tab-btn {
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

    /* tabela gerada pelo financas.js */
    .modern-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .modern-table th {
      padding: 10px 14px; text-align: left;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      border-bottom: 1px solid var(--border-default);
      background: var(--depth-3);
    }
    .modern-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .modern-table tr:last-child td { border-bottom: none; }
    .modern-table tr:hover td { background: rgba(255,255,255,0.02); }

    .table-container { overflow-x: auto; }

    /* Dashboard cards */
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 0;
    }
    @media (max-width: 700px) { .dashboard-cards { grid-template-columns: 1fr; } }

    .dash-card {
      background: var(--depth-4);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      padding: 12px 14px;
    }
    .dash-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .dash-value { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; margin-top: 4px; color: var(--text-primary); }

    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .form-group label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input {
      background: var(--depth-4); border: 1px solid var(--border-default);
      border-radius: var(--r-md); padding: 9px 12px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 13px; outline: none; width: 100%;
      transition: border-color var(--transition-fast);
    }
    .form-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .form-input option { background: var(--depth-4); }

    .btn-primary {
      width: 100%; padding: 10px; background: var(--accent-blue); color: #fff;
      border: none; border-radius: var(--r-md); font-family: var(--font-body);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: filter var(--transition-fast);
      margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .dash-header { margin-bottom: 14px; }
  </style>
</head>
<body>

<div class="erp-layout">
  <div id="sidebar-placeholder"></div>

  <main class="erp-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">💰 Finanças</h1>
        <p class="page-subtitle">Gestão de despesas — Universo Compra Certa</p>
      </div>
    </div>

    <div class="page-content">
      <div class="fin-layout">

        <!-- COLUNA ESQUERDA: formulário -->
        <div class="card" style="position:sticky;top:20px;">
          <div class="card-title">Lançamento de Despesa</div>
          <form id="formDespesa" onsubmit="adicionarDespesa(event)">
            <div class="form-group">
              <label>Data</label>
              <input type="text" id="add-data" class="form-input" placeholder="DD/MM/AAAA" required />
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <select id="add-nome" class="form-input" required>
                <option value="Transporte / Frete">Transporte / Frete</option>
                <option value="Embalagens / Etiquetas">Embalagens / Etiquetas</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="form-group">
              <label>Descrição</label>
              <input type="text" id="add-descricao" class="form-input" placeholder="Ex: J3 Transportadora" />
            </div>
            <div class="form-group">
              <label>Valor (R$)</label>
              <input type="text" id="add-valor" class="form-input" placeholder="0,00" required />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="add-situacao" class="form-input">
                <option value="Pago">Pago</option>
                <option value="Pendente">Pendente</option>
              </select>
            </div>
            <button type="submit" class="btn-primary" id="btnSalvar">+ Adicionar Despesa</button>
          </form>
        </div>

        <!-- COLUNA DIREITA: dashboard + tabela -->
        <div style="display:flex;flex-direction:column;gap:14px;">

          <!-- Dashboard cards -->
          <div class="dash-header">
            <div class="dashboard-cards">
              <div class="dash-card">
                <div class="dash-label">Total Geral</div>
                <div class="dash-value" id="dash-total">R$ 0,00</div>
              </div>
              <div class="dash-card">
                <div class="dash-label">Total Pago</div>
                <div class="dash-value" style="color:var(--accent-green)" id="dash-pago">R$ 0,00</div>
              </div>
              <div class="dash-card">
                <div class="dash-label">Total Pendente</div>
                <div class="dash-value" style="color:var(--accent-orange)" id="dash-pendente">R$ 0,00</div>
              </div>
            </div>
          </div>

          <!-- Card com tabs + tabela -->
          <div class="card" style="padding:0;overflow:hidden;">
            <!-- Tabs geradas pelo financas.js -->
            <div class="tabs-container" id="tabsContainer"></div>

            <!-- Tabela gerada pelo financas.js -->
            <div class="table-container">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Categoria</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="listaDespesas">
                  <tr>
                    <td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted);">
                      Carregando...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="/menu.js"></script>
<script src="/financas.js"></script>
</body>
</html>
