<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Admin Produtos — Expedição Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/erp.css" />
  <style>
    /* Layout split: busca esquerda + painel direita */
    .admin-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 72px);
      overflow: hidden;
    }
    @media (max-width: 860px) {
      .admin-layout { grid-template-columns: 1fr; height: auto; }
    }

    /* Coluna esquerda — busca */
    .admin-search-col {
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .admin-search-head {
      padding: 14px; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
    }
    .search-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }
    .results-list { flex: 1; overflow-y: auto; }
    .results-list::-webkit-scrollbar { width: 3px; }
    .results-list::-webkit-scrollbar-thumb { background: var(--depth-5); border-radius: 2px; }

    .result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
    }
    .result-item:hover { background: var(--depth-4); }
    .result-item.active { background: rgba(59,130,246,.08); border-right: 3px solid var(--accent-blue); }
    .ri-img { width: 40px; height: 40px; border-radius: var(--r-sm); object-fit: cover; background: var(--depth-5); flex-shrink: 0; }
    .ri-info { flex: 1; min-width: 0; }
    .ri-sku { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent-blue); font-weight: 700; }
    .ri-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .ri-status { display: flex; gap: 4px; margin-top: 3px; align-items: center; }
    .dot-photo { width: 7px; height: 7px; border-radius: 50%; background: var(--depth-5); border: 1px solid var(--border-default); }
    .dot-photo.has { background: var(--accent-green); border-color: transparent; }

    /* Coluna direita — painel */
    .admin-panel-col { overflow-y: auto; }
    .admin-panel-col::-webkit-scrollbar { width: 4px; }
    .admin-panel-col::-webkit-scrollbar-thumb { background: var(--depth-4); border-radius: 2px; }

    .no-sel {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-muted); text-align: center; padding: 40px;
    }
    .no-sel-icon { font-size: 44px; opacity: .15; }
    .no-sel h3 { font-size: 16px; color: var(--text-secondary); }
    .no-sel p { font-size: 13px; max-width: 300px; line-height: 1.6; }

    /* Produto Panel */
    .prod-panel { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .prod-hdr { background: var(--depth-3); border: 1px solid var(--border-default); border-radius: var(--r-lg); padding: 18px 20px; }
    .prod-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; line-height: 1.3; }
    .prod-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .ptag { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: var(--r-full); background: var(--depth-5); color: var(--text-secondary); border: 1px solid var(--border-default); }
    .ptag-blue { background: rgba(59,130,246,.1); color: var(--accent-blue); border-color: rgba(59,130,246,.2); }
    .ptag-warn { background: rgba(245,200,66,.1); color: var(--accent-yellow); border-color: rgba(245,200,66,.2); }

    .bling-section { margin-top: 14px; }
    .bling-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.15); border-radius: var(--r-full); padding: 3px 9px; font-size: 10px; font-weight: 700; color: var(--accent-blue); }
    .bling-badge::before { content: '⬡'; }
    .bling-readonly-label { font-size: 10px; color: var(--text-muted); }
    .bling-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-top: 10px; }
    .bling-field { background: var(--depth-4); border-radius: var(--r-sm); padding: 9px 11px; }
    .bling-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .bling-val { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; margin-top: 3px; }
    .bling-val.empty { color: var(--text-muted); font-size: 12px; }

    /* Seções */
    .section { background: var(--depth-3); border: 1px solid var(--border-default); border-radius: var(--r-lg); overflow: hidden; }
    .sec-hdr { padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
    .sec-hdr-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .sec-body { padding: 16px 18px; }
    .system-badge { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.2); border-radius: var(--r-full); padding: 2px 7px; font-size: 9px; font-weight: 700; color: var(--accent-green); }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .4px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }
    textarea { min-height: 80px; resize: vertical; }

    /* Fotos */
    .photo-section { display: flex; flex-direction: column; gap: 16px; }
    .photo-group-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
    .photo-strip { display: flex; flex-wrap: wrap; gap: 8px; }
    .photo-card { position: relative; width: 100px; height: 100px; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border-default); }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
      background: rgba(0,0,0,.65); border: none; border-radius: 50%;
      color: #fff; font-size: 11px; cursor: pointer; opacity: 0;
      display: flex; align-items: center; justify-content: center; transition: opacity .15s;
    }
    .photo-card:hover .photo-del { opacity: 1; }
    .photo-add {
      width: 100px; height: 100px; border-radius: var(--r-md);
      border: 2px dashed var(--border-default); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px; cursor: pointer;
      background: var(--depth-4); transition: .15s;
    }
    .photo-add:hover { border-color: var(--accent-blue); background: rgba(59,130,246,.05); }
    .photo-add input[type=file] { display: none; }
    .photo-add-icon { font-size: 22px; }
    .photo-add-label { font-size: 10px; font-weight: 700; color: var(--text-muted); }

    .bin-photo-wrap { position: relative; display: inline-block; }
    .bin-photo-wrap img { width: 120px; height: 120px; object-fit: cover; border-radius: var(--r-md); border: 1px solid var(--border-default); display: block; }
    .bin-photo-date { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    /* Embalagens sugeridas */
    .emb-sugg { display: flex; flex-direction: column; gap: 6px; }
    .emb-sugg-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--depth-4); border-radius: var(--r-md); border: 1px solid var(--border-subtle);
    }
    .emb-sugg-name { font-size: 13px; font-weight: 700; }
    .emb-sugg-dims { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }
    .emb-sugg-stock { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; }
    .emb-sugg-stock.ok   { color: var(--accent-green); }
    .emb-sugg-stock.warn { color: var(--accent-yellow); }
    .emb-sugg-stock.low  { color: var(--accent-red); }
    .emb-empty { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  </style>
</head>
<body>

<div class="erp-layout">
  <div id="sidebar-placeholder"></div>

  <main class="erp-main" style="overflow:hidden;display:flex;flex-direction:column;">

    <div class="page-header" style="flex-shrink:0;padding-bottom:12px;">
      <div>
        <h1 class="page-title">🖼️ Admin Produtos</h1>
        <p class="page-subtitle">Fotos, localização e notas operacionais</p>
      </div>
    </div>

    <div class="admin-layout">

      <!-- BUSCA -->
      <div class="admin-search-col">
        <div class="admin-search-head">
          <input type="text" id="searchInput" placeholder="SKU, EAN ou nome…"
            style="width:100%;background:var(--depth-4);border:1px solid var(--border-default);border-radius:var(--r-md);padding:9px 12px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;"
            autocomplete="off" />
          <div class="search-hint" id="searchHint">Digite ao menos 3 letras</div>
        </div>
        <div class="results-list" id="resultsList">
          <div style="padding:20px;text-align:center;font-size:13px;color:var(--text-muted);">
            Busque um produto acima
          </div>
        </div>
      </div>

      <!-- PAINEL -->
      <div class="admin-panel-col">
        <div class="no-sel" id="noSel">
          <div class="no-sel-icon">🖼️</div>
          <h3>Selecione um produto</h3>
          <p>Busque pelo SKU, EAN ou nome e selecione para editar fotos, localização e informações operacionais.</p>
        </div>
        <div id="prodPanel" style="display:none;"></div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="/menu.js"></script>
<script>
'use strict';

const TERMINAL_KEY = 'expedicao_pro_terminal_id';
function tid(){let id=localStorage.getItem(TERMINAL_KEY);if(!id){id=crypto.randomUUID();localStorage.setItem(TERMINAL_KEY,id);}return id;}

async function api(path,opts={}){
  const token=localStorage.getItem('expedicao_token')||'';
  const res=await fetch(path,{...opts,headers:{'content-type':'application/json','x-terminal-id':tid(),'authorization':`Bearer ${token}`,...(opts.headers||{})}});
  const d=await res.json().catch(()=>({}));
  if(res.status===401){window.location.href='/login';return null;}
  if(!res.ok)throw new Error(d.error||`HTTP ${res.status}`);
  return d;
}

function esc(s){return(s??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);}

let _tt=null;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);
}

let currentSku=null, currentProduct=null, searchTimer=null, embalagens=[];

async function loadEmbalagens(){
  try{const d=await api('/embalagens/list');if(d)embalagens=d.items||[];}catch{}
}

const searchInput=document.getElementById('searchInput');
searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  const q=searchInput.value.trim();
  if(q.length<3){document.getElementById('searchHint').textContent='Digite ao menos 3 letras';return;}
  document.getElementById('searchHint').textContent='Buscando…';
  searchTimer=setTimeout(()=>doSearch(q),250);
});

async function doSearch(q){
  try{
    const d=await api(`/admin/products/search?q=${encodeURIComponent(q)}`);
    if(!d)return;
    renderResults(d.items||[]);
  }catch(e){document.getElementById('searchHint').textContent=`Erro: ${e.message}`;}
}

function renderResults(items){
  const list=document.getElementById('resultsList');
  const hint=document.getElementById('searchHint');
  hint.textContent=`${items.length} resultado(s)`;
  list.innerHTML='';
  if(!items.length){list.innerHTML='<div style="padding:16px;text-align:center;font-size:13px;color:var(--text-muted);">Nenhum resultado</div>';return;}
  for(const p of items){
    const hasStock=(p.override?.stockPhotos?.length>0);
    const hasBin=!!p.override?.binPhoto;
    const imgSrc=p.displayImage||'/assets/placeholder.png';
    const div=document.createElement('div');
    div.className=`result-item${p.sku===currentSku?' active':''}`;
    div.innerHTML=`
      <img class="ri-img" src="${esc(imgSrc)}" onerror="this.src='/assets/placeholder.png'" alt="">
      <div class="ri-info">
        <div class="ri-sku">${esc(p.sku||'')}</div>
        <div class="ri-name">${esc(p.name||'')}</div>
        <div class="ri-status">
          <span class="dot-photo ${hasStock?'has':''}" title="Foto produto"></span>
          <span class="dot-photo ${hasBin?'has':''}" title="Foto prateleira"></span>
          <span style="font-size:10px;color:var(--text-muted);margin-left:4px;">${hasStock?'📷':''} ${hasBin?'📍':''}</span>
        </div>
      </div>`;
    div.addEventListener('click',()=>selectProduct(p.sku));
    list.appendChild(div);
  }
}

async function selectProduct(sku){
  currentSku=sku;
  document.querySelectorAll('.result-item').forEach(el=>el.classList.toggle('active',el.querySelector('.ri-sku')?.textContent===sku));
  try{
    const d=await api(`/admin/products/${encodeURIComponent(sku)}`);
    if(!d)return;
    currentProduct=d.item;
    renderPanel(d.item);
  }catch(e){toast(`Erro: ${e.message}`,'err');}
}

function renderPanel(p){
  document.getElementById('noSel').style.display='none';
  const panel=document.getElementById('prodPanel');
  panel.style.display='block';
  const ov=p.override||{};
  const customBin=ov.customBinName||p.bin||'';
  const notes=ov.notes||'';
  const stockPhotos=Array.isArray(ov.stockPhotos)?ov.stockPhotos:[];
  const boxPhotos=Array.isArray(ov.boxPhotos)?ov.boxPhotos:[];
  const binPhoto=ov.binPhoto||null;
  const binDate=ov.updatedAtMs?new Date(ov.updatedAtMs).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):null;
  const w=p.width||null, h=p.height||null, d2=p.depth||null;
  const wt=p.weight||null, wb=p.weightBruto||null;
  const loc=p.bin||null, stock=p.estoque??p.stock??null;

  const embSugg=embalagens.filter(emb=>{
    if(!w||!h)return false;
    const pw=parseFloat(w)||0,ph=parseFloat(h)||0,pd=parseFloat(d2)||0,mg=1.25;
    if(emb.type==='saco'){const mid=[pw,ph,pd].sort((a,b)=>a-b)[1];const max=Math.max(pw,ph,pd);return mid<=(emb.width||0)*mg&&max<=(emb.height||0)*mg;}
    return pw<=(emb.width||0)*mg&&ph<=(emb.height||0)*mg&&pd<=(emb.depth||0)*mg;
  }).slice(0,5);

  panel.innerHTML=`
  <div class="prod-panel">
    <div class="prod-hdr">
      <div class="prod-name">${esc(p.name||'')}</div>
      <div class="prod-tags">
        <span class="ptag ptag-blue">SKU: ${esc(p.sku||'')}</span>
        ${p.ean?`<span class="ptag">EAN: ${esc(p.ean)}</span>`:''}
        ${p.eanBox?`<span class="ptag">EAN cx: ${esc(p.eanBox)}</span>`:''}
        ${customBin?`<span class="ptag ptag-warn">📍 ${esc(customBin)}</span>`:''}
        ${stock!==null?`<span class="ptag ptag-blue">⬡ Estoque: ${stock}</span>`:''}
      </div>
      <div class="bling-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span class="bling-badge">Dados do Bling</span>
          <span class="bling-readonly-label">somente leitura — reimporte o CSV para atualizar</span>
        </div>
        <div class="bling-grid">
          ${bf('Peso líq.',wt?`${wt} kg`:null)} ${bf('Peso bruto',wb?`${wb} kg`:null)}
          ${bf('Largura',w?`${w} cm`:null)} ${bf('Altura',h?`${h} cm`:null)}
          ${bf('Profund.',d2?`${d2} cm`:null)} ${bf('Local Bling',loc)}
          ${bf('Estoque',stock!==null?String(stock):null)} ${bf('Itens/cx',p.itensPorCaixa?String(p.itensPorCaixa):null)}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr"><div class="sec-hdr-title">📍 Localização <span class="system-badge">Sistema</span></div></div>
      <div class="sec-body" style="display:flex;flex-direction:column;gap:14px;">
        <div class="field">
          <label>Nome do local (prateleira, rua, caixa…)</label>
          <div class="input-row">
            <input type="text" id="inputBin" value="${esc(customBin)}" placeholder="Ex: Rua A — Prateleira 2 — Caixa 3" />
            <button class="btn btn-primary btn-sm" onclick="saveBin()">Salvar</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Foto da Prateleira</div>
          <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;">
            ${binPhoto?`<div><div class="bin-photo-wrap"><img src="${esc(binPhoto)}" onerror="this.src='/assets/placeholder.png'" alt=""><button class="photo-del" style="opacity:1;position:absolute;top:4px;right:4px;" onclick="deletePhoto('bin',null)">✕</button></div>${binDate?`<div class="bin-photo-date">📅 ${esc(binDate)}</div>`:''}</div>`:`<div style="font-size:12px;color:var(--text-muted);align-self:center;">Sem foto de localização</div>`}
            <label class="photo-add" style="width:110px;height:${binPhoto?'80':'110'}px;">
              <input type="file" accept="image/*" onchange="uploadPhoto('bin',this)" />
              <span class="photo-add-icon">📸</span>
              <span class="photo-add-label">${binPhoto?'Atualizar':'Tirar foto'}</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr">
        <div class="sec-hdr-title">📦 Fotos do Produto <span class="system-badge">Sistema</span></div>
        <span style="font-size:11px;color:var(--text-muted);">${stockPhotos.length}/10</span>
      </div>
      <div class="sec-body photo-section">
        <div class="photo-group">
          <div class="photo-group-label">📦 Produto (sem embalagem)</div>
          <div class="photo-strip" id="stripStock">
            ${stockPhotos.map((url,i)=>pc(url,'stock',i)).join('')}
            ${stockPhotos.length<10?pAdd('stock'):''}
          </div>
        </div>
        <div class="photo-group">
          <div class="photo-group-label">🎁 Produto embalado</div>
          <div class="photo-strip" id="stripBox">
            ${boxPhotos.map((url,i)=>pc(url,'box',i)).join('')}
            ${boxPhotos.length<10?pAdd('box'):''}
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr"><div class="sec-hdr-title">📝 Notas Operacionais <span class="system-badge">Sistema</span></div></div>
      <div class="sec-body" style="display:flex;flex-direction:column;gap:10px;">
        <div class="field">
          <label>Notas para o separador (aparece no pedido)</label>
          <textarea id="inputNotes" placeholder="Ex: Produto frágil — embalar com bolha.">${esc(notes)}</textarea>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveNotes()">Salvar notas</button>
      </div>
    </div>

    <div class="section" style="margin-bottom:20px;">
      <div class="sec-hdr">
        <div class="sec-hdr-title">🎁 Embalagens Compatíveis</div>
        <a href="/embalagens" style="font-size:12px;color:var(--accent-blue);text-decoration:none;font-weight:700;">Gerenciar →</a>
      </div>
      <div class="sec-body">
        ${w&&h?(embSugg.length?`<div class="emb-sugg">${embSugg.map(emb=>{
          const sc=emb.stock<=emb.stockMin?'low':emb.stock<=emb.stockMin*1.5?'warn':'ok';
          const dims=[emb.width,emb.height,emb.depth].filter(Boolean).join('×');
          return `<div class="emb-sugg-item"><span style="font-size:18px;">${emb.type==='saco'?'🛍️':'📦'}</span><div style="flex:1;min-width:0;"><div class="emb-sugg-name">${esc(emb.name)}</div><div style="font-size:11px;color:var(--text-muted);">${dims}${emb.unit||'cm'}</div></div><span class="emb-sugg-stock ${sc}">Estq: ${emb.stock}</span></div>`;
        }).join('')}</div>`:`<div class="emb-empty">Nenhuma embalagem compatível com ${w}×${h}×${d2||'?'} cm.</div>`):`<div class="emb-empty">Produto sem dimensões no Bling — impossível sugerir embalagens.</div>`}
      </div>
    </div>
  </div>`;

  panel.querySelectorAll('.photo-add-input').forEach(input=>{
    input.addEventListener('change',function(){uploadPhoto(this.dataset.kind,this);});
  });
}

function bf(label,val){return `<div class="bling-field"><div class="bling-label">${esc(label)}</div><div class="bling-val${val?'':' empty'}">${val?esc(val):'—'}</div></div>`;}
function pc(url,kind,idx){return `<div class="photo-card"><img src="${esc(url)}" onerror="this.src='/assets/placeholder.png'" alt=""><button class="photo-del" onclick="deletePhoto('${esc(kind)}',${idx})">✕</button></div>`;}
function pAdd(kind){return `<label class="photo-add"><input type="file" accept="image/*" class="photo-add-input" data-kind="${esc(kind)}" /><span class="photo-add-icon">📷</span><span class="photo-add-label">Adicionar</span></label>`;}

async function saveBin(){
  if(!currentSku)return;
  const customBinName=document.getElementById('inputBin').value;
  try{await api(`/admin/products/${encodeURIComponent(currentSku)}`,{method:'PATCH',body:JSON.stringify({customBinName})});toast('Localização salva ✓','ok');await reloadProduct();}
  catch(e){toast(`Erro: ${e.message}`,'err');}
}

async function saveNotes(){
  if(!currentSku)return;
  const notes=document.getElementById('inputNotes').value;
  try{await api(`/admin/products/${encodeURIComponent(currentSku)}`,{method:'PATCH',body:JSON.stringify({notes})});toast('Notas salvas ✓','ok');}
  catch(e){toast(`Erro: ${e.message}`,'err');}
}

async function uploadPhoto(kind,input){
  if(!currentSku||!input.files?.length)return;
  const formData=new FormData();
  formData.append('file',input.files[0]);
  formData.append('kind',kind);
  toast('Enviando foto…','info');
  try{
    const res=await fetch(`/admin/products/${encodeURIComponent(currentSku)}/upload`,{method:'POST',headers:{'authorization':`Bearer ${localStorage.getItem('expedicao_token')||''}`},body:formData});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    toast('Foto salva ✓','ok');input.value='';await reloadProduct();
  }catch(e){toast(`Erro no upload: ${e.message}`,'err');}
}

async function deletePhoto(kind,idx){
  if(!currentSku||!currentProduct)return;
  if(!confirm('Remover esta foto?'))return;
  const ov=currentProduct.override||{};
  let patch={};
  if(kind==='bin'){patch.binPhoto='';}
  else if(kind==='stock'){const arr=[...(ov.stockPhotos||[])];arr.splice(idx,1);patch.stockPhotos=arr;}
  else if(kind==='box'){const arr=[...(ov.boxPhotos||[])];arr.splice(idx,1);patch.boxPhotos=arr;}
  try{await api(`/admin/products/${encodeURIComponent(currentSku)}`,{method:'PATCH',body:JSON.stringify(patch)});toast('Foto removida','info');await reloadProduct();}
  catch(e){toast(`Erro: ${e.message}`,'err');}
}

async function reloadProduct(){
  if(!currentSku)return;
  try{
    const d=await api(`/admin/products/${encodeURIComponent(currentSku)}`);
    if(!d)return;
    currentProduct=d.item;renderPanel(d.item);
    document.querySelectorAll('.result-item').forEach(el=>el.classList.toggle('active',el.querySelector('.ri-sku')?.textContent===currentSku));
  }catch{}
}

window.saveBin=saveBin;window.saveNotes=saveNotes;window.uploadPhoto=uploadPhoto;window.deletePhoto=deletePhoto;

loadEmbalagens();
</script>
</body>
</html>
