<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pedidos Bling — Expedição Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/erp.css" />
  <style>
    .bling-status-bar {
      display:flex;align-items:center;gap:12px;padding:10px 16px;
      border-radius:var(--r-md);border:1px solid var(--border-default);
      background:var(--depth-3);
    }
    .b-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .b-dot.ok{background:var(--accent-green);box-shadow:0 0 6px rgba(16,185,129,.4);}
    .b-dot.off{background:var(--text-muted);}

    .filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}

    /* ── Card NF ── */
    .nf-card{
      background:var(--depth-3);border:1px solid var(--border-default);
      border-radius:var(--r-lg);overflow:hidden;transition:border-color .15s;
    }
    .nf-card:hover{border-color:var(--border-strong);}
    .nf-card.clonado{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.02);}

    .nf-hdr{
      display:grid;grid-template-columns:auto 1fr auto auto;
      align-items:center;gap:12px;padding:13px 16px;cursor:pointer;
    }
    .nf-num{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap;}
    .nf-num span{font-size:10px;color:var(--text-muted);font-weight:400;margin-left:6px;}
    .nf-cliente{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nf-sub{font-size:11px;color:var(--text-secondary);margin-top:2px;}
    .nf-valor{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent-green);white-space:nowrap;}
    .nf-chevron{color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;}
    .nf-chevron.open{transform:rotate(180deg);}

    /* marketplace badges */
    .mkt{font-size:9px;font-weight:800;padding:2px 7px;border-radius:var(--r-full);white-space:nowrap;}
    .mkt-ml   {background:rgba(245,200,66,.9);color:#000;}
    .mkt-shop {background:rgba(249,115,22,.15);color:var(--accent-orange);border:1px solid rgba(249,115,22,.25);}
    .mkt-other{background:var(--depth-5);color:var(--text-secondary);border:1px solid var(--border-default);}

    /* Painel de itens */
    .nf-body{display:none;flex-direction:column;border-top:1px solid var(--border-subtle);}
    .nf-body.open{display:flex;}

    .nf-itens{padding:10px 16px;display:flex;flex-direction:column;gap:5px;background:var(--depth-4);}

    .item-row-nf{
      display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;
      padding:7px 10px;background:var(--depth-3);border-radius:var(--r-sm);
      border:1px solid var(--border-subtle);
    }
    .item-sku{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--accent-blue);}
    .item-nome{font-size:12px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-qty{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap;}
    .item-ok {color:var(--accent-green);font-size:10px;font-weight:700;}
    .item-no {color:var(--accent-red);  font-size:10px;font-weight:700;}

    .aviso-sku{
      display:flex;align-items:center;gap:7px;padding:7px 10px;
      background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);
      border-radius:var(--r-sm);font-size:11px;color:var(--accent-orange);
    }

    .nf-footer{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:10px 16px;border-top:1px solid var(--border-subtle);background:var(--depth-4);
    }
    .clonado-tag{
      font-size:11px;font-weight:700;color:var(--accent-green);
      background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);
      border-radius:var(--r-full);padding:3px 10px;
    }

    /* Loading inline */
    .loading-itens{
      padding:16px;text-align:center;font-size:12px;
      color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:8px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .spin{display:inline-block;animation:spin .8s linear infinite;}

    /* empty / connect */
    .list-msg{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:60px 20px;gap:10px;color:var(--text-muted);text-align:center;
    }
    .list-msg .ico{font-size:40px;opacity:.2;}
    .connect-card{
      background:var(--depth-3);border:1px solid var(--border-default);border-radius:var(--r-xl);
      padding:48px 32px;text-align:center;max-width:440px;margin:0 auto;
    }
  </style>
</head>
<body>

<div class="erp-layout">
  <div id="sidebar-placeholder"></div>
  <main class="erp-main">

    <div class="page-header">
      <div>
        <h1 class="page-title">⬡ Pedidos do Bling</h1>
        <p class="page-subtitle">NFs de saída autorizadas — importe para a fila de separação</p>
      </div>
    </div>

    <div class="page-content" id="pageContent">
      <div class="list-msg"><div class="ico">⬡</div><p>Verificando conexão…</p></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>
<script src="/menu.js"></script>
<script>
'use strict';

const TK='expedicao_pro_terminal_id';
function tid(){let i=localStorage.getItem(TK);if(!i){i=crypto.randomUUID();localStorage.setItem(TK,i);}return i;}

async function api(path,opts={}){
  const token=localStorage.getItem('expedicao_token')||'';
  const res=await fetch(path,{...opts,headers:{'content-type':'application/json','x-terminal-id':tid(),'authorization':`Bearer ${token}`,...(opts.headers||{})}});
  const d=await res.json().catch(()=>({}));
  if(res.status===401 && d.error==='bling_not_authorized') throw Object.assign(new Error('bling_not_authorized'),{blingAuth:true});
  if(res.status===401 && !d.error?.includes('bling')) { window.location.href='/login'; return null; }
  if(!res.ok) throw new Error(d.error||`HTTP ${res.status}`);
  return d;
}

function esc(s){return(s??'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);}
let _tt=null;
function toast(msg,type='info'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3500);}

// ── ESTADO ──
let NOTAS   = [];   // lista resumida das NFs
let CLONADOS = new Set(JSON.parse(localStorage.getItem('bling_clonados')||'[]'));
let DATA_SEL = new Date().toISOString().split('T')[0];

function saveClonados(){ localStorage.setItem('bling_clonados',JSON.stringify([...CLONADOS])); }

// ── BOOT ──
async function boot(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('success')){ toast('✅ Bling conectado!','ok'); history.replaceState({},'','/bling'); }
  if(params.get('error'))  { toast(`❌ Erro: ${params.get('error')}`,'error'); history.replaceState({},'','/bling'); }

  const status=await api('/bling/status').catch(()=>null);
  if(!status?.authorized){ renderConnect(); return; }
  renderMain(status);
  carregarNFs();
}

// ── TELA CONNECT ──
function renderConnect(){
  document.getElementById('pageContent').innerHTML=`
    <div class="connect-card">
      <div style="font-size:56px;margin-bottom:16px;">⬡</div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:800;margin-bottom:8px;">Conectar ao Bling</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:24px;">
        Autorize o acesso às suas Notas Fiscais de Saída para importar pedidos automaticamente.
      </div>
      <a href="/bling/auth" class="btn btn-primary btn-lg" style="display:inline-flex;">🔗 Autorizar acesso</a>
      <div style="margin-top:14px;font-size:12px;color:var(--text-muted);">Você será redirecionado para o Bling.</div>
    </div>`;
}

// ── TELA PRINCIPAL ──
function renderMain(status){
  document.getElementById('pageContent').innerHTML=`
    <div class="bling-status-bar">
      <div class="b-dot ok"></div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">Bling conectado</div>
        <div style="font-size:11px;color:var(--text-muted);">Atualizado: ${status.updatedAtMs?new Date(status.updatedAtMs).toLocaleString('pt-BR'):'–'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="desconectar()">Desconectar</button>
    </div>

    <div class="filter-bar">
      <div class="field">
        <label style="font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;">Data</label>
        <input type="date" id="dataInput" value="${DATA_SEL}"
          style="background:var(--depth-4);border:1px solid var(--border-default);border-radius:var(--r-md);padding:8px 12px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;"
          onchange="DATA_SEL=this.value;carregarNFs()" />
      </div>
      <button class="btn btn-ghost btn-sm" onclick="carregarNFs()">⟳ Atualizar</button>
      <div style="margin-left:auto;font-size:12px;color:var(--text-muted);" id="countLabel"></div>
    </div>

    <div id="listaNFs" style="display:flex;flex-direction:column;gap:8px;">
      ${skeleton(5)}
    </div>`;
}

function skeleton(n){
  return Array(n).fill(0).map(()=>`
    <div style="background:var(--depth-3);border:1px solid var(--border-default);border-radius:var(--r-lg);padding:16px;display:flex;gap:12px;">
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
        <div class="skeleton" style="height:11px;width:35%;border-radius:4px;"></div>
        <div class="skeleton" style="height:14px;width:60%;border-radius:4px;"></div>
      </div>
      <div class="skeleton" style="width:100px;height:32px;border-radius:var(--r-md);"></div>
    </div>`).join('');
}

// ── CARREGAR NFs ──
async function carregarNFs(){
  const lista=document.getElementById('listaNFs');
  if(!lista) return;
  lista.innerHTML=skeleton(6);
  document.getElementById('countLabel').textContent='';
  try{
    const d=await api(`/bling/pedidos?data=${DATA_SEL}`);
    NOTAS=d.items||[];
    document.getElementById('countLabel').textContent=`${NOTAS.length} NF(s) encontrada(s)`;
    renderLista();
  }catch(e){
    if(e.blingAuth){ renderConnect(); return; }
    lista.innerHTML=`<div class="list-msg"><div class="ico">⚠️</div><p>${esc(e.message)}</p></div>`;
    toast(`Erro: ${e.message}`,'error');
  }
}

// ── RENDER LISTA ──
function renderLista(){
  const lista=document.getElementById('listaNFs');
  if(!NOTAS.length){
    lista.innerHTML=`<div class="list-msg"><div class="ico">📭</div><p>Nenhuma NF autorizada em ${DATA_SEL}.</p></div>`;
    return;
  }
  lista.innerHTML=NOTAS.map(nf=>cardHtml(nf)).join('');
}

function cardHtml(nf){
  const clonado=CLONADOS.has(String(nf.id));
  const mktCls =nf.marketplace==='MERCADO_LIVRE'?'mkt-ml':nf.marketplace==='SHOPEE'?'mkt-shop':'mkt-other';
  const mktLbl =nf.marketplace==='MERCADO_LIVRE'?'ML':nf.marketplace==='SHOPEE'?'SHOPEE':'OUTROS';
  const valor  =Number(nf.valorTotal||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

  return `
    <div class="nf-card${clonado?' clonado':''}" id="nf-${nf.id}">
      <div class="nf-hdr" onclick="toggleNF(${nf.id})">
        <div>
          <div class="nf-num">NF ${esc(String(nf.numero||nf.id))}</div>
          <div class="nf-sub">${esc(nf.dataEmissao||'')} · ${esc(nf.situacao||'')}</div>
        </div>
        <div style="min-width:0;">
          <div class="nf-cliente">${esc(nf.cliente?.nome||'Cliente')}</div>
        </div>
        <span class="mkt ${mktCls}">${mktLbl}</span>
        <span class="nf-valor">${valor}</span>
        <span class="nf-chevron" id="chev-${nf.id}">▾</span>
      </div>
      <div class="nf-body" id="body-${nf.id}">
        <div class="nf-itens" id="itens-${nf.id}">
          <div class="loading-itens">Clique para carregar itens…</div>
        </div>
        <div class="nf-footer" id="footer-${nf.id}">
          ${clonado
            ?`<span class="clonado-tag">✓ Já criado no sistema</span><a href="/pedidos" class="btn btn-ghost btn-sm">Ver fila →</a>`
            :`<span style="font-size:11px;color:var(--text-muted);">Abra os itens para habilitar</span>
              <button class="btn btn-primary btn-sm" disabled id="btn-clonar-${nf.id}" onclick="clonarNF(${nf.id})">
                📥 Criar na Expedição
              </button>`
          }
        </div>
      </div>
    </div>`;
}

// ── TOGGLE + CARREGAR ITENS ──
const _detalhes={}; // cache de itens já carregados

window.toggleNF=async function(id){
  const body =document.getElementById(`body-${id}`);
  const chev =document.getElementById(`chev-${id}`);
  if(!body) return;

  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(chev) chev.classList.toggle('open',!isOpen);

  // Só carrega itens se está abrindo e ainda não carregou
  if(!isOpen && !_detalhes[id]){
    await carregarItensNF(id);
  }
};

async function carregarItensNF(id){
  const itensEl =document.getElementById(`itens-${id}`);
  const footerEl=document.getElementById(`footer-${id}`);
  if(!itensEl) return;

  itensEl.innerHTML=`<div class="loading-itens"><span class="spin">⟳</span> Carregando itens…</div>`;

  try{
    const d=await api(`/bling/pedidos/${id}`);
    const nf=d.item;
    _detalhes[id]=nf;

    // Atualiza numeroPedido no objeto
    const idx=NOTAS.findIndex(n=>n.id===id);
    if(idx>=0 && nf.numeroPedido) NOTAS[idx].numeroPedido=nf.numeroPedido;

    renderItens(id,nf);
  }catch(e){
    itensEl.innerHTML=`<div class="aviso-sku">⚠️ Erro ao carregar itens: ${esc(e.message)}</div>`;
  }
}

function renderItens(id,nf){
  const itensEl =document.getElementById(`itens-${id}`);
  const footerEl=document.getElementById(`footer-${id}`);
  const itens   =nf.itens||[];
  const semSku  =itens.filter(it=>!it.sku);
  const comSku  =itens.filter(it=> it.sku);

  if(!itens.length){
    itensEl.innerHTML=`<div class="aviso-sku">⚠️ Esta NF não possui itens cadastrados.</div>`;
    return;
  }

  let html='';
  if(semSku.length) html+=`<div class="aviso-sku">⚠️ ${semSku.length} item(s) sem SKU — não serão incluídos no pedido</div>`;

  html+=itens.map(it=>`
    <div class="item-row-nf">
      <span class="item-sku">${esc(it.sku||'—')}</span>
      <span class="item-nome" title="${esc(it.nome)}">${esc(it.nome||'')}</span>
      <span class="item-qty">×${it.qty}</span>
      ${it.sku?`<span class="item-ok">✓</span>`:`<span class="item-no">⚠</span>`}
    </div>`).join('');

  itensEl.innerHTML=html;

  // Atualiza footer — habilita botão apenas se tem pelo menos 1 item com SKU
  const clonado=CLONADOS.has(String(id));
  if(footerEl && !clonado){
    if(comSku.length>0){
      footerEl.innerHTML=`
        <div style="font-size:11px;color:var(--text-secondary);">${comSku.length} item(s) com SKU · ${semSku.length} sem SKU</div>
        <button class="btn btn-primary btn-sm" id="btn-clonar-${id}" onclick="clonarNF(${id})">
          📥 Criar na Expedição
        </button>`;
    } else {
      footerEl.innerHTML=`<div class="aviso-sku" style="flex:1;">⚠️ Nenhum item com SKU — cadastre os códigos no Bling para importar</div>`;
    }
  }
}

// ── CLONAR ──
window.clonarNF=async function(id){
  const nf=_detalhes[id];
  if(!nf){ toast('Abra os itens primeiro','info'); return; }

  const nota=NOTAS.find(n=>n.id===id)||{};
  const btn =document.getElementById(`btn-clonar-${id}`);
  if(btn){ btn.disabled=true; btn.textContent='Criando…'; }

  const nomePedido=nf.numeroPedido||nf.numero;
  const nomeCliente=`${nf.cliente?.nome||''} ${nomePedido?'[#'+nomePedido+']':''}`.trim();

  try{
    const r=await api('/bling/clonar',{
      method:'POST',
      body:JSON.stringify({
        blingNfId:    id,
        numeroPedido: String(nomePedido||''),
        marketplace:  nota.marketplace||'OUTROS',
        clienteNome:  nomeCliente,
        itens:        nf.itens||[],
      })
    });

    CLONADOS.add(String(id));
    saveClonados();

    // Atualiza card
    const card=document.getElementById(`nf-${id}`);
    if(card) card.classList.add('clonado');
    const footer=document.getElementById(`footer-${id}`);
    if(footer) footer.innerHTML=`
      <span class="clonado-tag">✓ Criado: ${esc(r.orderId)}</span>
      <a href="/pedidos" class="btn btn-ghost btn-sm">Ver na fila →</a>`;

    let msg=`✅ ${r.orderId} criado!`;
    if(r.skusFaltando?.length)      msg+=` · ${r.skusFaltando.length} SKU(s) não encontrado(s)`;
    if(r.itensSemSku?.length)       msg+=` · ${r.itensSemSku.length} item(s) sem SKU ignorado(s)`;
    toast(msg, r.skusFaltando?.length?'warn':'ok');
  }catch(e){
    toast(`Erro: ${e.message}`,'error');
    if(btn){ btn.disabled=false; btn.textContent='📥 Criar na Expedição'; }
  }
};

window.desconectar=async function(){
  if(!confirm('Desconectar o Bling?')) return;
  await api('/bling/disconnect',{method:'POST'});
  localStorage.removeItem('bling_clonados');
  renderConnect();
  toast('Bling desconectado','info');
};

boot();
</script>
</body>
</html>
