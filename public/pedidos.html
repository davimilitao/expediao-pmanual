<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pedidos do Dia — Expedição Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161c2d;
      --s2:      #1e2640;
      --s3:      #242e4c;
      --line:    rgba(255,255,255,0.07);
      --text:    #e2e8f7;
      --muted:   #7a85a0;
      --muted2:  #4a5268;
      --ml:      #ffe600;
      --shop:    #ff6633;
      --green:   #00e676;
      --red:     #ff4060;
      --blue:    #3d8bff;
      --warn:    #ffb300;
      --r: 12px; --r2: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* TOPBAR */
    .topbar {
      height: 56px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px;
      background: var(--surface); border-bottom: 1px solid var(--line);
      position: relative; flex-shrink: 0; z-index: 20;
    }
    .topbar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--ml),var(--blue),var(--shop)); }
    .brand { font-family:'Space Mono',monospace; font-weight:700; font-size:15px; color:var(--ml); letter-spacing:1px; }
    .brand span { color:var(--muted); font-weight:400; }
    .topbar-mid { display:flex; gap:6px; }
    .topbar-right { display:flex; gap:8px; align-items:center; }
    .clock { font-family:'Space Mono',monospace; font-size:13px; color:var(--muted); }

    .stat-pill { display:flex; align-items:center; gap:5px; padding:4px 11px; border-radius:999px; border:1px solid var(--line); background:var(--s2); font-size:12px; font-weight:700; }
    .dot { width:7px; height:7px; border-radius:50%; }
    .dot-p { background:var(--warn); box-shadow:0 0 6px var(--warn); }
    .dot-i { background:var(--blue); box-shadow:0 0 6px var(--blue); }
    .dot-k { background:var(--green); box-shadow:0 0 6px var(--green); }

    .btn { padding:8px 14px; border-radius:var(--r); border:1px solid var(--line); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; font-size:13px; transition:.15s; }
    .btn:disabled { opacity:.35; cursor:not-allowed; }
    .btn-ghost   { background:var(--s2); color:var(--muted); }
    .btn-ghost:not(:disabled):hover { background:var(--s3); color:var(--text); }
    .btn-primary { background:var(--blue); color:#fff; border-color:transparent; }
    .btn-primary:not(:disabled):hover { filter:brightness(1.15); }
    .btn-success { background:var(--green); color:#000; border-color:transparent; font-weight:900; }
    .btn-success:not(:disabled):hover { filter:brightness(1.1); }

    /* LAYOUT */
    .layout { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 56px); overflow:hidden; }

    /* SIDEBAR */
    .sidebar { background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; overflow:hidden; }
    .tabs { display:grid; grid-template-columns:1fr 1fr 1fr; border-bottom:1px solid var(--line); }
    .tab-btn { padding:11px 4px; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; transition:.2s; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .tab-btn.active { color:var(--text); border-bottom-color:var(--blue); }
    .tab-cnt { font-family:'Space Mono',monospace; font-size:16px; }
    .tab-btn.active .tab-cnt { color:var(--blue); }
    .sidebar-search { padding:10px 12px; border-bottom:1px solid var(--line); }
    .sidebar-search input { width:100%; background:var(--s2); border:1px solid var(--line); border-radius:var(--r); padding:8px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; }
    .sidebar-search input:focus { border-color:rgba(61,139,255,.4); }
    .sidebar-search input::placeholder { color:var(--muted2); }
    .order-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
    .order-list::-webkit-scrollbar { width:4px; }
    .order-list::-webkit-scrollbar-thumb { background:var(--s3); border-radius:2px; }

    /* ORDER CARD */
    .oc { background:var(--s2); border:1px solid var(--line); border-left:3px solid transparent; border-radius:var(--r); padding:10px 12px; cursor:pointer; transition:.15s; }
    .oc:hover { background:var(--s3); }
    .oc.active { border-color:rgba(61,139,255,.45); border-left-color:var(--blue); background:var(--s3); }
    .oc.priority { border-left-color:var(--ml); }
    .oc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .oc-id { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; }
    .oc-badges { display:flex; gap:4px; }
    .badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; }
    .badge-ml   { background:rgba(255,230,0,.15); color:var(--ml); border:1px solid rgba(255,230,0,.3); }
    .badge-shop { background:rgba(255,102,51,.15); color:var(--shop); border:1px solid rgba(255,102,51,.3); }
    .badge-oth  { background:rgba(122,133,160,.15); color:var(--muted); border:1px solid var(--line); }
    .badge-flex { background:rgba(255,230,0,.9); color:#000; font-weight:900; }
    .oc-bar-row { display:flex; align-items:center; gap:8px; }
    .oc-bar-bg  { flex:1; height:4px; background:var(--s3); border-radius:2px; overflow:hidden; }
    .oc-bar-fill { height:100%; border-radius:2px; background:var(--blue); transition:width .3s; }
    .oc-bar-fill.full { background:var(--green); }
    .oc-ratio { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
    .oc-thumbs { display:flex; gap:4px; margin-top:6px; }
    .oc-thumb { width:30px; height:30px; border-radius:6px; object-fit:cover; border:1px solid var(--line); background:var(--s3); }
    .oc-more { width:30px; height:30px; border-radius:6px; background:var(--s3); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--muted); }
    .oc-time { font-size:10px; color:var(--muted2); margin-top:5px; }

    /* MAIN */
    .main { display:flex; flex-direction:column; overflow:hidden; }

    .order-hdr { background:var(--surface); border-bottom:1px solid var(--line); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }
    .order-hdr-left { display:flex; flex-direction:column; gap:4px; }
    .order-hdr-id { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; }
    .order-hdr-meta { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
    .order-hdr-right { display:flex; gap:8px; flex-shrink:0; }

    .tag { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; }
    .tag-p { background:rgba(255,179,0,.15); color:var(--warn); border:1px solid rgba(255,179,0,.3); }
    .tag-i { background:rgba(61,139,255,.15); color:var(--blue); border:1px solid rgba(61,139,255,.3); }
    .tag-k { background:rgba(0,230,118,.15); color:var(--green); border:1px solid rgba(0,230,118,.3); }

    .scan-bar { background:var(--s2); border-bottom:1px solid var(--line); padding:8px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .scan-hint { font-size:12px; color:var(--muted); flex:1; }
    .scan-hint strong { color:var(--text); }
    .scan-status { font-family:'Space Mono',monospace; font-size:11px; }
    .scan-status.ready { color:var(--green); }
    .scan-status.busy  { color:var(--warn); }

    .items-area { flex:1; overflow-y:auto; padding:14px 18px; display:flex; flex-direction:column; gap:10px; }
    .items-area::-webkit-scrollbar { width:4px; }
    .items-area::-webkit-scrollbar-thumb { background:var(--s2); border-radius:2px; }

    /* NO ORDER */
    .no-order { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted2); text-align:center; padding:40px; }
    .no-order-icon { font-size:52px; opacity:.2; }
    .no-order h3 { font-size:18px; color:var(--muted); }
    .no-order p { font-size:13px; max-width:280px; line-height:1.6; }

    /* ITEM */
    .item-row { background:var(--surface); border:1px solid var(--line); border-radius:var(--r2); overflow:hidden; transition:.2s; position:relative; }
    .item-row.checked { border-color:rgba(0,230,118,.25); background:rgba(0,230,118,.03); }
    .item-row.checked::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--green); border-radius:2px 0 0 2px; }

    .item-top { display:grid; grid-template-columns:96px 1fr auto; }

    .item-img-wrap { width:96px; position:relative; cursor:pointer; flex-shrink:0; }
    .item-img-wrap img { width:96px; height:96px; object-fit:cover; display:block; background:var(--s2); transition:.2s; }
    .item-img-wrap:hover img { filter:brightness(.75); }
    .item-photo-img { width:96px; height:96px; object-fit:cover; display:block; background:var(--s2); }
    .img-cam { position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,.65); border-radius:6px; font-size:13px; padding:2px 4px; pointer-events:none; opacity:0; transition:.15s; }
    .item-img-wrap:hover .img-cam { opacity:1; }
    .img-cam { position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,.65); border-radius:6px; font-size:13px; padding:2px 4px; pointer-events:none; opacity:0; transition:.15s; }
    .item-img-wrap:hover .img-cam { opacity:1; }

    .item-info { padding:12px 14px; display:flex; flex-direction:column; justify-content:center; gap:5px; min-width:0; }
    .item-name { font-weight:700; font-size:14px; line-height:1.3; }
    .item-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:2px; }
    .itag { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); background:var(--s2); border:1px solid var(--line); padding:2px 7px; border-radius:6px; }
    .itag-bin { color:var(--warn); border-color:rgba(255,179,0,.25); background:rgba(255,179,0,.08); }
    .item-notes { font-size:11px; color:var(--muted); font-style:italic; }
    .btn-expand { margin-top:7px; background:transparent; border:1px solid var(--line); border-radius:8px; padding:4px 10px; font-size:11px; font-weight:700; color:var(--blue); cursor:pointer; font-family:'DM Sans',sans-serif; transition:.15s; width:fit-content; }
    .btn-expand:hover { background:var(--s2); }

    .item-qty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px 16px; gap:6px; border-left:1px solid var(--line); background:var(--s2); min-width:86px; }
    .qty-num { font-family:'Space Mono',monospace; font-size:28px; font-weight:700; line-height:1; }
    .qty-num.full { color:var(--green); }
    .qty-of { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; }
    .qty-btn { background:var(--s3); border:1px solid var(--line); border-radius:8px; cursor:pointer; width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:18px; transition:.15s; color:var(--text); }
    .qty-btn:hover:not(:disabled) { background:var(--blue); border-color:transparent; transform:scale(1.1); }
    .qty-btn:disabled { opacity:.3; cursor:not-allowed; }
    .qty-btn.done { background:rgba(0,230,118,.15); border-color:rgba(0,230,118,.3); color:var(--green); }

    /* PAINEL FOTOS */
    .photos-panel { border-top:1px solid var(--line); padding:14px 16px; background:var(--s2); }
    .photos-panel.hidden { display:none; }
    .photos-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .photo-col { display:flex; flex-direction:column; gap:6px; }
    .photo-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
    .photo-date { display:block; font-size:10px; color:var(--muted2); font-weight:400; text-transform:none; letter-spacing:0; margin-top:2px; }
    .photo-big { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; border:1px solid var(--line); background:var(--s3); cursor:zoom-in; transition:.2s; }
    .photo-big:hover { transform:scale(1.04); }
    .photo-empty { width:100%; aspect-ratio:1; border-radius:10px; border:1px dashed var(--line); background:var(--s3); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12px; color:var(--muted2); text-align:center; gap:4px; }
    .photo-empty small { font-size:10px; }
    .bin-big { margin-top:10px; font-size:13px; color:var(--warn); font-weight:700; }

    /* PROGRESS FOOTER */
    .pf { background:var(--surface); border-top:1px solid var(--line); padding:11px 20px; display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .pf-label { font-size:12px; color:var(--muted); }
    .pf-bar { flex:1; height:6px; background:var(--s2); border-radius:3px; overflow:hidden; }
    .pf-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--blue),var(--green)); transition:width .4s; }
    .pf-pct { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; }

    /* TOAST */
    .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(70px); background:var(--s2); border:1px solid var(--line); border-radius:var(--r2); padding:11px 20px; font-weight:700; font-size:14px; box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:100; transition:transform .25s,opacity .25s; opacity:0; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.ok  { border-color:rgba(0,230,118,.4); color:var(--green); }
    .toast.err { border-color:rgba(255,64,96,.4); color:var(--red); }
    .toast.info{ border-color:rgba(61,139,255,.4); color:var(--blue); }

    .scan-flash { position:fixed; inset:0; pointer-events:none; z-index:200; opacity:0; transition:opacity .08s; }
    .ok-flash  { background:rgba(0,230,118,.1); }
    .err-flash { background:rgba(255,64,96,.1); }

    @media(max-width:860px) { .layout { grid-template-columns:1fr; } .sidebar { display:none; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">EXPEDICAO<span>/PRO</span></div>
  <div class="topbar-mid">
    <div class="stat-pill"><span class="dot dot-p"></span><span id="cntP">–</span>&nbsp;separar</div>
    <div class="stat-pill"><span class="dot dot-i"></span><span id="cntI">–</span>&nbsp;separado</div>
    <div class="stat-pill"><span class="dot dot-k"></span><span id="cntK">–</span>&nbsp;expedido</div>
  </div>
  <div class="topbar-right">
    <div class="clock" id="clock">--:--:--</div>
    <button class="btn btn-ghost" style="font-size:12px" onclick="refreshAll()">⟳</button>
    <a class="btn btn-ghost" style="font-size:12px;text-decoration:none" href="/">← Painel</a>
    <a class="btn btn-ghost" style="font-size:12px;text-decoration:none" href="/manual">+ Pedido</a>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="tabs">
      <button class="tab-btn active" data-status="pending" onclick="switchTab('pending')"><span class="tab-cnt" id="tc-p">0</span>A Separar</button>
      <button class="tab-btn" data-status="picked"  onclick="switchTab('picked')"><span class="tab-cnt" id="tc-i">0</span>Separado</button>
      <button class="tab-btn" data-status="packed"  onclick="switchTab('packed')"><span class="tab-cnt" id="tc-k">0</span>Expedido</button>
    </div>
    <div class="sidebar-search"><input type="text" id="filterInput" placeholder="Filtrar pedidos…" oninput="renderList()" /></div>
    <div class="order-list" id="orderList"></div>
  </div>

  <div class="main">
    <div class="no-order" id="noOrder">
      <div class="no-order-icon">📦</div>
      <h3>Selecione um pedido</h3>
      <p>Escolha um pedido na lista à esquerda para ver os itens e iniciar a separação.</p>
    </div>

    <div id="orderView" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
      <div class="order-hdr">
        <div class="order-hdr-left">
          <div class="order-hdr-id" id="viewId">—</div>
          <div class="order-hdr-meta" id="viewMeta"></div>
        </div>
        <div class="order-hdr-right">
          <button class="btn btn-ghost" onclick="refreshSelected()">⟳</button>
          <button class="btn btn-primary" id="btnPicked" disabled onclick="markPicked()">✓ Confirmar Separação</button>
          <button class="btn btn-success" id="btnPacked" disabled onclick="markPacked()">🚚 Marcar Expedido</button>
        </div>
      </div>

      <div class="scan-bar">
        <span style="font-size:17px">⬡</span>
        <div class="scan-hint"><strong>Scanner ativo</strong> — bipe SKU ou EAN + Enter para dar baixa</div>
        <div class="scan-status ready" id="scanStatus">● PRONTO</div>
      </div>

      <div class="items-area" id="itemsArea"></div>

      <div class="pf">
        <div class="pf-label">Progresso</div>
        <div class="pf-bar"><div class="pf-fill" id="pfBar" style="width:0%"></div></div>
        <div class="pf-pct" id="pfPct">0 / 0</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="scan-flash" id="scanFlash"></div>
<input type="text" id="scannerInput" style="opacity:0;position:absolute;pointer-events:none;width:1px;height:1px;" autocomplete="off" />

<script src="/pedidos.js"></script>
</body>
</html>
